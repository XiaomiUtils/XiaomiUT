      <stop offset="0%" style="stop-color:#ff8a00;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#ff5e00;stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#0f172a"></rect>

  <!-- Phone body -->
